<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RamzApp | محادثة</title>
    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.0.0-beta3/css/all.css">
    <!-- SimplePeer لـ WebRTC -->
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        /* ========== إعدادات ثابتة – بدون تكبير، أحجام ثابتة ========== */
        :root {
            --bg: #ffffff;
            --surface: #ffffff;
            --surface2: #f5f7f9;
            --surface3: #e9edef;
            --text: #111111;
            --text2: #333333;
            --text3: #667781;
            --border: #e0e0e0;
            --accent: #25D366;
            --accent2: #128C7E;
            --green: #25D366;
            --blue-check: #34b7f1;
            --online: #4caf50;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --transition: 0.2s ease;
        }
        .dark-theme {
            --bg: #0a0a0a;
            --surface: #111111;
            --surface2: #1e1e1e;
            --surface3: #2a2a2a;
            --text: #ffffff;
            --text2: #dddddd;
            --text3: #aaaaaa;
            --border: #2c2c2c;
            --accent: #25D366;
            --accent2: #128C7E;
            --green: #25D366;
            --blue-check: #34b7f1;
            --online: #4caf50;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg);
            font-family: 'Inter', 'Cairo', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: var(--text);
            transition: background var(--transition), color var(--transition);
            font-size: 14px;
        }
        /* رأس المحادثة */
        .chat-header {
            background: var(--surface);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            min-height: 56px;
            z-index: 20;
        }
        .back-btn, .header-btn {
            background: none;
            border: none;
            color: var(--text2);
            font-size: 20px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .back-btn:active, .header-btn:active { transform: scale(0.95); }
        .back-btn:hover, .header-btn:hover { background: var(--surface3); color: var(--text); }
        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            flex-shrink: 0;
            cursor: pointer;
            color: #fff;
        }
        .chat-info { flex: 1; min-width: 0; cursor: pointer; }
        .chat-name {
            font-weight: 600;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }
        .chat-status {
            font-size: 12px;
            color: var(--text3);
        }
        .online-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            margin-left: 4px;
        }
        .typing-dots { display: inline-flex; gap: 3px; margin-right: 4px; }
        .typing-dots span {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--green);
            animation: typeBounce 1.4s infinite;
        }
        @keyframes typeBounce { 0%,60%,100% { opacity: 0.3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-4px); } }

        /* منطقة الرسائل */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: var(--bg);
            scroll-behavior: smooth;
        }
        .date-divider {
            text-align: center;
            margin: 8px 0;
            font-size: 11px;
            color: var(--text3);
            background: var(--surface2);
            display: inline-block;
            padding: 4px 14px;
            border-radius: 30px;
            align-self: center;
        }
        .msg-row { display: flex; width: 100%; animation: fadeInUp 0.25s ease; }
        .msg-row.own { justify-content: flex-end; }
        .msg-bubble {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
            word-break: break-word;
        }
        .own .msg-bubble {
            background: var(--accent);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .other .msg-bubble {
            background: var(--surface2);
            color: var(--text);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }
        .attachment-img {
            max-width: 180px;
            max-height: 180px;
            border-radius: 14px;
            margin: 4px 0;
            cursor: pointer;
        }
        .msg-time-row {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 4px;
            margin-top: 4px;
            font-size: 10px;
            opacity: 0.7;
        }
        .msg-actions { display: flex; gap: 5px; margin-top: 5px; opacity: 0; transition: opacity 0.2s; }
        .msg-bubble:hover .msg-actions { opacity: 1; }
        .msg-actions button {
            background: rgba(0,0,0,0.05);
            border: none;
            color: var(--text);
            font-size: 11px;
            cursor: pointer;
            padding: 3px 8px;
            border-radius: 20px;
        }

        /* شريط الإدخال */
        .input-bar {
            background: var(--surface);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-top: 1px solid var(--border);
        }
        .input-bar input {
            flex: 1;
            background: var(--surface3);
            border: none;
            border-radius: 25px;
            padding: 10px 14px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            height: 40px;
        }
        .input-btn {
            background: none;
            border: none;
            color: var(--text3);
            font-size: 20px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .input-btn:active { transform: scale(0.95); }
        .send-btn { background: var(--accent) !important; color: #fff !important; }
        .mic-btn.recording { color: #ff4d4d !important; animation: pulseMic 1s infinite; }
        @keyframes pulseMic { 0%,100% { text-shadow: 0 0 0 rgba(255,77,77,0); } 50% { text-shadow: 0 0 8px #ff4d4d; } }

        /* منقي الإيموجي */
        .emoji-picker {
            position: absolute;
            bottom: 80px;
            right: 10px;
            background: var(--surface);
            border-radius: 20px;
            padding: 8px;
            width: 280px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            flex-wrap: wrap;
            gap: 5px;
            z-index: 100;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .emoji-picker.show { display: flex; }
        .emoji-picker span { font-size: 24px; cursor: pointer; padding: 5px; border-radius: 8px; }

        /* شريط البحث */
        .chat-search-bar {
            padding: 8px 12px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: none;
            align-items: center;
            gap: 8px;
        }
        .chat-search-bar input { flex: 1; padding: 8px 14px; border-radius: 25px; border: none; background: var(--surface3); color: var(--text); font-size: 13px; outline: none; }

        /* عارض الصور */
        .image-viewer {
            position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 3000;
            display: none; align-items: center; justify-content: center;
        }
        .image-viewer.active { display: flex; }
        .image-viewer-header {
            position: absolute; top: 0; left: 0; right: 0; display: flex;
            justify-content: space-between; padding: 12px; z-index: 3001;
        }
        .image-viewer-back-btn, .image-viewer-menu-btn {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(16px);
            border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%;
            font-size: 18px; cursor: pointer;
        }
        .image-viewer-dropdown {
            position: absolute; top: 55px; left: 10px;
            background: rgba(30,30,40,0.96); backdrop-filter: blur(20px);
            border-radius: 16px; min-width: 180px; overflow: hidden; display: none;
            flex-direction: column; box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            z-index: 3002;
        }
        .image-viewer-dropdown.show { display: flex; }
        .image-viewer img { max-width: 90vw; max-height: 85vh; border-radius: 12px; }

        /* مودال الملف الشخصي */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            z-index: 2000; display: none; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-card {
            background: var(--surface); border-radius: 28px; width: 320px; max-width: 90%;
            text-align: center; animation: popIn 0.3s ease;
        }
        @keyframes popIn { from { opacity: 0; transform: scale(0.85) translateY(20px); } }
        .modal-avatar {
            width: 90px; height: 90px; border-radius: 50%; margin: 20px auto 10px;
            border: 3px solid var(--accent); display: flex; align-items: center;
            justify-content: center; font-size: 36px; background: var(--surface3); color: var(--text);
        }
        .modal-name { font-size: 18px; font-weight: 700; color: var(--text); }
        .modal-bio { font-size: 11px; color: var(--text3); margin-bottom: 16px; }
        .modal-actions {
            display: grid; grid-template-columns: repeat(2,1fr); gap: 2px;
            padding: 10px; background: var(--surface2); border-radius: 20px;
        }
        .modal-action {
            background: none; border: none; padding: 8px; border-radius: 16px;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            cursor: pointer; font-size: 11px; color: var(--text);
        }
        .modal-close {
            position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.5);
            border: none; color: #fff; width: 32px; height: 32px; border-radius: 50%;
            cursor: pointer; z-index: 2001; backdrop-filter: blur(8px);
        }

        /* قوائم منبثقة */
        .dropdown-menu, .sub-dropdown-menu {
            position: fixed;
            top: 56px;
            left: 8px;
            background: var(--surface);
            border-radius: 14px;
            width: 210px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            z-index: 9999;
            display: none;
            overflow: hidden;
        }
        .dropdown-menu.show, .sub-dropdown-menu.show { display: block; }
        .dropdown-item, .sub-dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            cursor: pointer;
            transition: background 0.15s;
            color: var(--text2);
            font-size: 13px;
            border-bottom: 1px solid var(--border);
        }
        .dropdown-item:last-child, .sub-dropdown-item:last-child { border-bottom: none; }
        .dropdown-item:hover, .sub-dropdown-item:hover { background: var(--surface3); }
        .dropdown-item i, .sub-dropdown-item i { width: 18px; font-size: 14px; color: var(--text3); }
        .dropdown-item.danger, .sub-dropdown-item.danger { color: #ff5e5e; }
        .more-btn { background: var(--surface2); border-top: 1px solid var(--border); margin-top: 4px; }

        /* نافذة الوسائط والروابط */
        .media-modal {
            position: fixed; inset: 0; background: var(--bg); z-index: 4000;
            display: none; flex-direction: column; overflow-y: auto;
        }
        .media-modal.show { display: flex; }
        .media-header {
            background: var(--surface); padding: 12px; display: flex;
            align-items: center; gap: 12px; border-bottom: 1px solid var(--border);
            position: sticky; top: 0;
        }
        .media-header button { background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; }
        .media-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px; padding: 12px;
        }
        .media-item { background: var(--surface2); border-radius: 8px; overflow: hidden; cursor: pointer; }
        .media-item img { width: 100%; height: 100px; object-fit: cover; }
        .media-item a { display: block; padding: 8px; color: var(--text); text-decoration: none; font-size: 12px; word-break: break-all; }

        /* نافذة المجموعة الجديدة */
        .group-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            z-index: 5000; display: none; align-items: center; justify-content: center;
        }
        .group-modal.show { display: flex; }
        .group-card {
            background: var(--surface); border-radius: 28px; width: 320px; max-width: 90%;
            padding: 20px;
        }
        .group-card input {
            width: 100%; padding: 12px; border-radius: 25px;
            border: 1px solid var(--border); background: var(--surface2); color: var(--text);
            margin-bottom: 12px;
        }
        .contacts-list-scroll {
            max-height: 200px; overflow-y: auto; margin: 12px 0;
            border: 1px solid var(--border); border-radius: 16px;
        }
        .contact-checkbox {
            display: flex; align-items: center; gap: 10px; padding: 8px 12px;
            cursor: pointer; border-bottom: 1px solid var(--border);
        }
        .contact-checkbox:hover { background: var(--surface2); }

        /* نافذة الإبلاغ */
        #reportModal textarea {
            width: 100%; margin: 12px 0; padding: 8px; border-radius: 12px;
            border: 1px solid var(--border); background: var(--surface2); color: var(--text);
        }

        /* نافذة السمات */
        .theme-buttons { display: flex; gap: 12px; margin: 12px 0; }
        .theme-buttons button {
            flex: 1; padding: 10px; border-radius: 25px; border: none; cursor: pointer;
        }

        /* شاشات المكالمات */
        .incoming-call-modal, .ongoing-call-modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); z-index: 10000;
            display: none; align-items: center; justify-content: center;
            flex-direction: column; gap: 20px;
        }
        .incoming-call-modal.show, .ongoing-call-modal.show { display: flex; }
        .caller-info { text-align: center; color: white; }
        .caller-avatar {
            width: 80px; height: 80px; border-radius: 50%; background: var(--accent);
            display: flex; align-items: center; justify-content: center; font-size: 32px;
            margin-bottom: 12px;
        }
        .caller-name { font-size: 20px; font-weight: 600; margin-bottom: 4px; color: white; }
        .call-status { font-size: 14px; opacity: 0.8; }
        .call-actions { display: flex; gap: 40px; margin-top: 20px; }
        .call-action-btn {
            width: 60px; height: 60px; border-radius: 50%; background: #ff4d4d;
            border: none; color: white; font-size: 28px; cursor: pointer;
        }
        .call-action-btn.answer { background: #25D366; }
        .call-timer { font-size: 32px; font-family: monospace; color: white; }

        /* عناصر الفيديو */
        #localVideo, #remoteVideo {
            position: fixed; z-index: 10001;
        }
        #localVideo { bottom: 20px; right: 20px; width: 120px; border-radius: 12px; border: 2px solid white; display: none; }
        #remoteVideo { top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: none; }

        /* التنبيهات */
        .global-toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: var(--surface2); color: var(--text); padding: 6px 16px; border-radius: 30px;
            font-size: 12px; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none;
            border: 1px solid var(--border); white-space: nowrap;
        }
    </style>
</head>
<body>
<div class="chat-header">
    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-right"></i></button>
    <div class="avatar" id="chatAvatar">?</div>
    <div class="chat-info" id="chatHeaderInfo">
        <div class="chat-name" id="chatNameDisp">...</div>
        <div class="chat-status" id="chatStatusDisp"></div>
    </div>
    <button class="header-btn" id="voiceCallBtn"><i class="fas fa-phone-alt"></i></button>
    <button class="header-btn" id="videoCallBtn"><i class="fas fa-video"></i></button>
    <button class="header-btn" id="chatMenuBtn"><i class="fas fa-ellipsis-v"></i></button>
</div>

<div class="dropdown-menu" id="chatMenu">
    <div class="dropdown-item" data-action="view_contact"><i class="fas fa-address-card"></i> عرض جهة الاتصال</div>
    <div class="dropdown-item" data-action="search"><i class="fas fa-search"></i> بحث</div>
    <div class="dropdown-item" data-action="media"><i class="fas fa-photo-video"></i> وسائط وروابط</div>
    <div class="dropdown-item" data-action="mute"><i class="fas fa-bell-slash"></i> كتم الإشعارات</div>
    <div class="dropdown-item" data-action="disappear"><i class="fas fa-clock"></i> رسائل ذاتية الاختفاء</div>
    <div class="dropdown-item" data-action="new_group"><i class="fas fa-users"></i> مجموعة جديدة</div>
    <div class="dropdown-item" data-action="chat_theme"><i class="fas fa-palette"></i> سمة الدردشة</div>
    <div class="dropdown-item more-btn" data-action="more"><i class="fas fa-ellipsis-h"></i> المزيد...</div>
</div>
<div class="sub-dropdown-menu" id="subMenu">
    <div class="sub-dropdown-item" data-action="report"><i class="fas fa-flag"></i> إبلاغ</div>
    <div class="sub-dropdown-item" data-action="block"><i class="fas fa-ban"></i> حظر</div>
    <div class="sub-dropdown-item" data-action="clear_chat"><i class="fas fa-trash-alt"></i> مسح المحادثة</div>
    <div class="sub-dropdown-item" data-action="transfer_chat"><i class="fas fa-exchange-alt"></i> نقل الدردشة</div>
    <div class="sub-dropdown-item" data-action="add_shortcut"><i class="fas fa-plus-square"></i> إضافة اختصار</div>
</div>

<div class="chat-search-bar" id="chatSearchBar" style="display:none;">
    <button class="header-btn" id="closeChatSearchBtn"><i class="fas fa-times"></i></button>
    <input type="text" id="chatSearchInput" placeholder="بحث في المحادثة...">
</div>

<div class="messages-area" id="messagesArea"></div>

<div class="input-bar">
    <button class="input-btn" id="emojiBtn"><i class="far fa-smile-wink"></i></button>
    <button class="input-btn" id="attachBtn"><i class="far fa-image"></i></button>
    <input type="text" id="msgInput" placeholder="اكتب رسالة..." autocomplete="off">
    <button class="input-btn send-btn" id="sendMsgBtn" style="display:none;"><i class="fas fa-paper-plane"></i></button>
    <button class="input-btn mic-btn" id="micBtn" style="display:flex;"><i class="fas fa-microphone"></i></button>
</div>
<div class="emoji-picker" id="emojiPicker"></div>
<input type="file" id="hiddenFileInput" style="display:none;" accept="image/*">

<div class="image-viewer" id="imageViewer">
    <div class="image-viewer-header">
        <button class="image-viewer-back-btn" id="imageViewerBackBtn"><i class="fas fa-arrow-right"></i></button>
        <div class="image-viewer-menu-container">
            <button class="image-viewer-menu-btn" id="imageViewerMenuBtn"><i class="fas fa-ellipsis-v"></i></button>
            <div class="image-viewer-dropdown" id="imageViewerDropdown">
                <div class="dropdown-item" data-action="save"><i class="far fa-save"></i> حفظ</div>
                <div class="dropdown-item" data-action="share"><i class="fas fa-share-alt"></i> مشاركة</div>
                <div class="dropdown-item" data-action="rotate"><i class="fas fa-undo-alt"></i> تدوير</div>
                <div class="dropdown-item" data-action="delete"><i class="far fa-trash-alt"></i> حذف</div>
            </div>
        </div>
    </div>
    <img src="" alt="صورة" id="viewerImage">
</div>

<div class="modal-overlay" id="contactProfileModal">
    <div class="modal-card">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 16px 0 16px;">
            <button class="modal-close" id="closeContactProfileModalBtn" style="position:static;background:none;color:var(--text);font-size:22px;"><i class="fas fa-times"></i></button>
            <button class="header-btn" id="contactProfileMenuBtn"><i class="fas fa-ellipsis-v"></i></button>
        </div>
        <div class="modal-avatar" id="contactProfileAvatar">?</div>
        <div class="modal-name" id="contactProfileName"></div>
        <div class="modal-bio" id="contactProfilePhone"></div>
        <div class="modal-actions" id="contactProfileActions"></div>
    </div>
</div>

<div class="media-modal" id="mediaModal">
    <div class="media-header">
        <button id="closeMediaModal"><i class="fas fa-times"></i></button>
        <span>وسائط وروابط</span>
    </div>
    <div class="media-grid" id="mediaGrid"></div>
</div>

<div class="group-modal" id="groupModal">
    <div class="group-card">
        <h3 style="margin-bottom:16px;">إنشاء مجموعة جديدة</h3>
        <input type="text" id="groupName" placeholder="اسم المجموعة">
        <div id="groupContactsList" class="contacts-list-scroll"></div>
        <button class="input-btn send-btn" id="createGroupBtn" style="width:100%; border-radius:25px;">إنشاء المجموعة</button>

function toast(msg) {

    el.className = 'global-toast';
    el.textContent = msg;

}
function timeAgo(d) {
    if (!d) return '';
    const s = Math.floor((Date.now() - new Date(d).getTime()) / 1000);
    if (s < 60) return 'الآن';
    if (s < 3600) return Math.floor(s/60)+' د';
    if (s < 86400) return Math.floor(s/3600)+' س';
    return Math.floor(s/86400)+' يوم';
}
function fmtTime(d) { return new Date(d).toLocaleTimeString('ar-SA', { hour:'2-digit', minute:'2-digit' }); }
function fmtDate(d) { return new Date(d).toLocaleDateString('ar-SA', { weekday:'long', month:'long', day:'numeric' }); }
function esc(s) { return s ? s.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' })[m]) : ''; }

async function sendMessage(text, mediaUrl='', type='text') {
    if (isBlocked && !isGroup) { toast('🚫 محظور'); return null; }
    if (isGroup && groupId) {
        const { data, error } = await supabase.from('group_messages').insert({
            group_id: groupId, sender_id: user.id, content: text, type, media_url: mediaUrl, created_at: new Date().toISOString()
        }).select().single();
        if (error) { toast('فشل إرسال رسالة المجموعة'); return null; }
        return data;
    } else {
        const { data, error } = await supabase.from('messages').insert({
            sender_id: user.id, receiver_id: currentChatId, content: text, type, media_url: mediaUrl,
            reply_to: replyTarget?.id || null, status: 'sent'
        }).select().single();
        if (error) { toast('فشل الإرسال'); return null; }
        return data;
    }
}
async function fetchMessages() {
    if (isGroup && groupId) {
        const { data } = await supabase.from('group_messages').select('*').eq('group_id', groupId).order('created_at', { ascending: true });
        return data || [];
    } else {
        const { data } = await supabase.from('messages').select('*')
            .or(`and(sender_id.eq.${user.id},receiver_id.eq.${currentChatId}),and(sender_id.eq.${currentChatId},receiver_id.eq.${user.id})`)
            .order('created_at', { ascending: true });
        return data || [];
    }
}
function subscribeToMessages() {
    if (isGroup && groupId) {
        return supabase.channel('group-msgs-'+groupId)
            .on('postgres_changes', { event:'INSERT', schema:'public', table:'group_messages', filter:`group_id=eq.${groupId}` },
                payload => { if(payload.new.sender_id !== user.id) appendMessage(payload.new); })
            .subscribe();
    } else {
        return supabase.channel('msgs-'+currentChatId)
            .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages', filter:`receiver_id=eq.${user.id}` },
                payload => {
                    if(payload.new.sender_id === currentChatId) {
                        appendMessage(payload.new);
                        supabase.from('messages').update({ status:'read' }).eq('id',payload.new.id);
                    }
                })
            .subscribe();
    }
}
async function uploadFile(file) {
    const fileName = `media/${user.id}/${Date.now()}-${file.name}`;
    const { error } = await supabase.storage.from('ramz-images').upload(fileName, file);
    if(error) throw error;
    const { data: url } = supabase.storage.from('ramz-images').getPublicUrl(fileName);
    return url.publicUrl;
}

function appendMessage(msg, scroll=true) {
    const area = document.getElementById('messagesArea');
    const isMe = (isGroup ? (msg.sender_id === user.id) : (msg.sender_id === user.id));
    const div = document.createElement('div');
    div.className = 'msg-row ' + (isMe ? 'own' : 'other');
    div.id = 'msg-'+msg.id;
    let stIcon = '';
    if (!isGroup && isMe) {
        if (msg.status === 'read') stIcon = '<i class="fas fa-check-double" style="color:#34b7f1;"></i>';
        else if (msg.status === 'delivered') stIcon = '<i class="fas fa-check-double"></i>';
        else stIcon = '<i class="fas fa-check"></i>';
    }
    let mediaContent = '';
    if (msg.type === 'image' && msg.media_url) {
        mediaContent = `<div><img src="${msg.media_url}" class="attachment-img" onclick="openImageViewer('${msg.media_url}')" loading="lazy"></div>`;
    } else if (msg.type === 'voice' && msg.media_url) {
        mediaContent = `<div class="voice-msg"><button class="voice-play-btn" data-audio="${msg.media_url}" onclick="playVoice(this)"><i class="fas fa-play"></i></button><div style="flex:1;height:20px;display:flex;align-items:center;gap:2px;">${Array.from({length:8},()=>`<div style="width:3px;background:var(--accent);border-radius:2px;height:${8+Math.random()*16}px;"></div>`).join('')}</div></div>`;
    }
    div.innerHTML = `
        <div class="msg-bubble">
            ${msg.reply_to && !isGroup ? `<div class="reply-preview" onclick="document.getElementById('msg-${msg.reply_to}')?.scrollIntoView()"><i class="fas fa-reply"></i> رد</div>` : ''}
            ${mediaContent}
            <div>${esc(msg.content || '')}</div>
            <div class="msg-time-row"><span>${fmtTime(msg.created_at)}</span> <span class="msg-status">${stIcon}</span></div>
            <div class="msg-actions">
                ${!isGroup ? `<button data-act="reply" data-id="${msg.id}"><i class="fas fa-reply"></i></button>` : ''}
                ${isMe ? `<button data-act="delete" data-id="${msg.id}"><i class="far fa-trash-alt"></i></button>` : ''}
            </div>
        </div>`;
    area.appendChild(div);
    div.querySelectorAll('.msg-actions button').forEach(b => b.addEventListener('click', e => {
        e.stopPropagation();
        if(b.dataset.act === 'reply') setReply(b.dataset.id);
        if(b.dataset.act === 'delete') deleteMsg(b.dataset.id);
    }));
    if(scroll) area.scrollTop = area.scrollHeight;
}
function setReply(mid) {

let disappearInterval = null;
function setDisappearingMessages() {
    let seconds = prompt('اختر المدة بالثواني (30، 60، 90):', '30');
    if (!seconds) return;
    localStorage.setItem(`disappear_${currentChatId}`, seconds);
    toast(`⏳ سيتم حذف الرسائل الجديدة تلقائياً بعد ${seconds} ثانية`);
    if (disappearInterval) clearInterval(disappearInterval);
    disappearInterval = setInterval(async () => {
        const disappearTime = localStorage.getItem(`disappear_${currentChatId}`);
        if (!disappearTime) return;
        const msgs = await fetchMessages();
        const now = Date.now();
        for (let msg of msgs) {
            if (msg.sender_id !== user.id && new Date(msg.created_at).getTime() < now - disappearTime * 1000) {
                if (isGroup && groupId) await supabase.from('group_messages').delete().eq('id', msg.id);
                else await supabase.from('messages').delete().eq('id', msg.id);
                document.getElementById(`msg-${msg.id}`)?.remove();
            }
        }
    }, 5000);
}

    isVideoCall = isVideo;
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: isVideo });
        if (isVideo) {
            document.getElementById('localVideo').srcObject = localStream;
            document.getElementById('localVideo').style.display = 'block';
            document.getElementById('remoteVideo').style.display = 'block';
        }
        const { data: call, error } = await supabase.from('calls').insert({
            caller_id: user.id, callee_id: currentChatId, status: 'ringing',
            type: isVideo ? 'video' : 'audio', created_at: new Date().toISOString()
        }).select().single();
        if (error) throw error;
        currentCallId = call.id;
        toast(isVideo ? '📹 جاري الاتصال المرئي...' : '📞 جاري الاتصال...');
        document.getElementById('ongoingCallerName').textContent = '...';
        document.getElementById('ongoingCallerAvatar').textContent = '?';
        document.getElementById('ongoingCallModal').classList.add('show');
        let start = Date.now();
        callTimerInterval = setInterval(() => {
            let diff = Math.floor((Date.now() - start) / 1000);
            document.getElementById('callTimer').textContent = `${Math.floor(diff/60)}:${(diff%60).toString().padStart(2,'0')}`;
        }, 1000);
        currentPeer = new SimplePeer({ initiator: true, stream: localStream });
        currentPeer.on('signal', async (data) => {
            await supabase.from('calls_signals').insert({ call_id: currentCallId, sender_id: user.id, signal_data: JSON.stringify(data), created_at: new Date().toISOString() });
        });
        currentPeer.on('stream', (stream) => {
            if (isVideo) document.getElementById('remoteVideo').srcObject = stream;
        });
        currentPeer.on('error', (err) => { console.error(err); endCall(); });
        currentPeer.on('close', () => endCall());
    } catch(err) { toast('⚠️ لا يمكن الوصول إلى الكاميرا/الميكروفون'); }
}
async function answerCall(callId) {
    const { data: call } = await supabase.from('calls').select('*').eq('id', callId).single();
    if (!call) return;
    isVideoCall = call.type === 'video';
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: isVideoCall });
        if (isVideoCall) {
            document.getElementById('localVideo').srcObject = localStream;
            document.getElementById('localVideo').style.display = 'block';
            document.getElementById('remoteVideo').style.display = 'block';
        }
        await supabase.from('calls').update({ status: 'ongoing', answered_at: new Date().toISOString() }).eq('id', callId);
        document.getElementById('incomingCallModal').classList.remove('show');
        if (ringtoneAudio) ringtoneAudio.stop();
        const { data: caller } = await supabase.from('users').select('name, avatar').eq('id', call.caller_id).single();
        document.getElementById('ongoingCallerName').textContent = caller?.name || 'مستخدم';
        document.getElementById('ongoingCallerAvatar').textContent = caller?.avatar || '?';
        document.getElementById('ongoingCallModal').classList.add('show');
        let start = Date.now();
        callTimerInterval = setInterval(() => {
            let diff = Math.floor((Date.now() - start) / 1000);
            document.getElementById('callTimer').textContent = `${Math.floor(diff/60)}:${(diff%60).toString().padStart(2,'0')}`;
        }, 1000);
        currentPeer = new SimplePeer({ initiator: false, stream: localStream });
        currentPeer.on('signal', async (data) => {
            await supabase.from('calls_signals').insert({ call_id: callId, sender_id: user.id, signal_data: JSON.stringify(data), created_at: new Date().toISOString() });
        });
        currentPeer.on('stream', (stream) => { if (isVideoCall) document.getElementById('remoteVideo').srcObject = stream; });
        currentPeer.on('error', (err) => { console.error(err); endCall(); });
        currentPeer.on('close', () => endCall());
        const { data: signals } = await supabase.from('calls_signals').select('*').eq('call_id', callId).order('created_at', { ascending: true });
        signals.forEach(sig => {
            if (sig.sender_id !== user.id && currentPeer) {
                try { currentPeer.signal(JSON.parse(sig.signal_data)); } catch(e) {}
            }
        });
    } catch(err) { toast('⚠️ لا يمكن الوصول إلى الكاميرا/الميكروفون'); }
}
async function rejectCall(callId) {
    await supabase.from('calls').update({ status: 'missed', ended_at: new Date().toISOString() }).eq('id', callId);
    document.getElementById('incomingCallModal').classList.remove('show');
    if (ringtoneAudio) ringtoneAudio.stop();
    currentCallId = null;
    toast('📞 مكالمة فائتة');
}
async function endCall() {
    if (!currentCallId) return;
    await supabase.from('calls').update({ status: 'completed', ended_at: new Date().toISOString() }).eq('id', currentCallId);
    document.getElementById('ongoingCallModal').classList.remove('show');
    if (callTimerInterval) clearInterval(callTimerInterval);
    if (localStream) localStream.getTracks().forEach(t => t.stop());
    if (currentPeer) currentPeer.destroy();
    localStream = null; currentPeer = null;
    document.getElementById('localVideo').style.display = 'none';
    document.getElementById('remoteVideo').style.display = 'none';
    currentCallId = null;
    toast('انتهت المكالمة');
}
function playRingtone() {
    if (ringtoneAudio) ringtoneAudio.stop();
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine'; osc.frequency.value = 440; gain.gain.value = 0.3;
    osc.start();
    let interval = setInterval(() => {
        if (!ringtoneAudio) { clearInterval(interval); osc.stop(); ctx.close(); return; }
        gain.gain.value = gain.gain.value === 0.3 ? 0 : 0.3;
    }, 500);
    ringtoneAudio = { stop: () => { clearInterval(interval); osc.stop(); ctx.close(); ringtoneAudio = null; } };
}
function subscribeToCalls() {
    if (callsChannel || isGroup) return;
    callsChannel = supabase.channel('calls-'+user.id)
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'calls', filter: `callee_id=eq.${user.id}` }, async (payload) => {
            const newCall = payload.new;
            if (newCall.status === 'ringing' && !currentCallId) {
                currentCallId = newCall.id;
                const { data: caller } = await supabase.from('users').select('name, avatar').eq('id', newCall.caller_id).single();
                document.getElementById('callerName').textContent = caller?.name || 'مستخدم';
                document.getElementById('callerAvatar').textContent = caller?.avatar || '?';
                document.getElementById('incomingCallModal').classList.add('show');
                playRingtone();
                setTimeout(async () => {
                    if (currentCallId && document.getElementById('incomingCallModal').classList.contains('show')) {
                        await rejectCall(currentCallId);
                    }
                }, 30000);
            }
        })
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'calls_signals' }, async (payload) => {
            const sig = payload.new;
            if (sig.call_id === currentCallId && sig.sender_id !== user.id && currentPeer) {
                try { currentPeer.signal(JSON.parse(sig.signal_data)); } catch(e) {}
            }
        })
        .subscribe();
}
document.getElementById('voiceCallBtn').onclick = () => startCall(false);
document.getElementById('videoCallBtn').onclick = () => startCall(true);
document.getElementById('answerCallBtn').onclick = () => { if (currentCallId) answerCall(currentCallId); };
document.getElementById('rejectCallBtn').onclick = () => { if (currentCallId) rejectCall(currentCallId); };
document.getElementById('endCallBtn').onclick = endCall;
document.getElementById('toggleVideoBtn').onclick = () => {
    if (localStream) {
        const video = localStream.getVideoTracks()[0];
        if (video) video.enabled = !video.enabled;
    }
};

// ========== تسجيل الصوت ==========
let micBtn = document.getElementById('micBtn');
micBtn.addEventListener('mousedown', startRecording);
micBtn.addEventListener('mouseup', stopRecording);
micBtn.addEventListener('mouseleave', stopRecording);
async function startRecording(e) {
    e.preventDefault();
    if (isRecording) return;
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        isRecording = true;
        micBtn.classList.add('recording');
        toast('🎙️ سجل... ارفع إصبعك للإرسال');
        mediaRecorder = new MediaRecorder(stream);
        recordingChunks = [];
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordingChunks.push(e.data); };
        mediaRecorder.onstop = async () => {
            const blob = new Blob(recordingChunks, { type: 'audio/webm' });
            const fileName = `voices/${user.id}/${Date.now()}.webm`;
            const { error } = await supabase.storage.from('ramz-images').upload(fileName, blob);
            if (error) toast('❌ فشل رفع التسجيل');
            else {
                const { data: publicURL } = supabase.storage.from('ramz-images').getPublicUrl(fileName);
                const msg = await sendMessage('🎤 رسالة صوتية', publicURL.publicUrl, 'voice');
                if (msg) appendMessage(msg);
                toast('✅ تم إرسال التسجيل');
            }
            stream.getTracks().forEach(t => t.stop());
            micBtn.classList.remove('recording');
            isRecording = false;
        };
        mediaRecorder.start();
    } catch(err) { toast('⚠️ لا يمكن الوصول للميكروفون'); isRecording=false; micBtn.classList.remove('recording'); }
}
function stopRecording() { if (isRecording && mediaRecorder?.state === 'recording') mediaRecorder.stop(); }

// شريط الإدخال
function updateSendBtn() {
    let has = document.getElementById('msgInput').value.trim().length > 0 || pendingImg;
    document.getElementById('sendMsgBtn').style.display = has ? 'flex' : 'none';
    document.getElementById('micBtn').style.display = has ? 'none' : 'flex';
}
document.getElementById('sendMsgBtn').onclick = async () => {
    let inp = document.getElementById('msgInput');
    let text = inp.value.trim();
    if(!text && !pendingImg) return;
    let type = pendingImg ? 'image' : 'text';
    let media = pendingImg || '';
    let msg = await sendMessage(text||'', media, type);
    if(msg) { appendMessage(msg); inp.value = ''; pendingImg = null; replyTarget = null; updateSendBtn(); }
};
document.getElementById('msgInput').addEventListener('keypress', e => { if(e.key === 'Enter') document.getElementById('sendMsgBtn').click(); });

// بدء التشغيل
(async () => {
    user = await getCurrentUser();
    if (!user) return;
    // التحقق من نوع المحادثة (فردي أم مجموعة)
    const { data: groupCheck } = await supabase.from('groups').select('id').eq('id', currentChatId).single();
    if (groupCheck) {
        isGroup = true;
        groupId = currentChatId;
        const { data: group } = await supabase.from('groups').select('name').eq('id', groupId).single();
        document.getElementById('chatNameDisp').textContent = group?.name || 'مجموعة';
        document.getElementById('chatAvatar').textContent = '👥';
        document.getElementById('chatStatusDisp').textContent = 'مجموعة';
        // إخفاء أزرار المكالمات في المجموعات
        document.getElementById('voiceCallBtn').style.display = 'none';
        document.getElementById('videoCallBtn').style.display = 'none';
    } else {
        isGroup = false;
        await supabase.from('users').update({ is_online: true, last_seen: new Date().toISOString() }).eq('id', user.id);
        window.addEventListener('beforeunload', () => {
            supabase.from('users').update({ is_online: false, last_seen: new Date().toISOString() }).eq('id', user.id);
        });
        let { data: chatUser } = await supabase.from('users').select('*').eq('id', currentChatId).single();
        if (!chatUser) { window.location.href = 'chats.html'; return; }
        document.getElementById('chatNameDisp').textContent = chatUser.name;
        document.getElementById('chatAvatar').textContent = chatUser.avatar || '?';
        let st = document.getElementById('chatStatusDisp');
        if (chatUser.is_online) st.innerHTML = 'متصل الآن <span class="online-indicator"></span>';
        else st.textContent = 'آخر ظهور ' + timeAgo(chatUser.last_seen);
        let customNames = JSON.parse(localStorage.getItem('ramzapp_contact_names') || '{}');
        if (customNames[currentChatId]) document.getElementById('chatNameDisp').textContent = customNames[currentChatId];
    }
    let msgs = await fetchMessages();
    document.getElementById('messagesArea').innerHTML = '';
    let lastDate = '';
    msgs.forEach(m => {
        let md = new Date(m.created_at).toDateString();
        if (md !== lastDate) {
            lastDate = md;
            document.getElementById('messagesArea').innerHTML += `<div class="date-divider">${fmtDate(m.created_at)}</div>`;
        }
        appendMessage(m, false);
    });
    document.getElementById('messagesArea').scrollTop = document.getElementById('messagesArea').scrollHeight;
    msgChannel = subscribeToMessages();
    if (!isGroup) subscribeToCalls();
    let typingTimer;
    document.getElementById('msgInput').addEventListener('input', () => {
        if (!isGroup) {
            supabase.channel('typing-'+currentChatId).send({ type:'broadcast', event:'typing', payload:{ user_id: user.id, isTyping: true } });
        }
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => {
            if (!isGroup) {
                supabase.channel('typing-'+currentChatId).send({ type:'broadcast', event:'typing', payload:{ user_id: user.id, isTyping: false } });
            }
        }, 2000);
    });
    if (!isGroup) {
        typingChannel = supabase.channel('typing-'+user.id);
        typingChannel.on('broadcast', { event:'typing' }, (payload) => {
            if (payload.user_id === currentChatId) {
                let st = document.getElementById('chatStatusDisp');
                if (payload.isTyping) st.innerHTML = '<span class="typing-dots"><span></span><span></span><span></span></span> يكتب الآن...';
                else st.innerHTML = chatUser.is_online ? 'متصل الآن <span class="online-indicator"></span>' : 'آخر ظهور ' + timeAgo(chatUser.last_seen);
            }
        }).subscribe();
    }
    updateSendBtn();
})();
