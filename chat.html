<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RamzApp | محادثة + صور + صوت</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d0d;
            font-family: 'Cairo', sans-serif;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: #1a1a1a;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2c2c2c;
        }
        .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .back-btn:hover { background: #2a2a2a; }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ff0050;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
        }
        .chat-info { flex: 1; }
        .chat-name { font-weight: 600; }
        .chat-status { font-size: 11px; color: #999; }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .msg-row { display: flex; width: 100%; }
        .msg-row.own { justify-content: flex-end; }
        .msg-bubble {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 18px;
            font-size: 14px;
            word-break: break-word;
        }
        .own .msg-bubble {
            background: #ff0050;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .other .msg-bubble {
            background: #1a1a1a;
            border: 1px solid #2c2c2c;
            border-bottom-left-radius: 4px;
        }
        .msg-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            margin-bottom: 6px;
            cursor: pointer;
            display: block;
        }
        audio {
            max-width: 200px;
            height: 32px;
            border-radius: 20px;
            margin-top: 4px;
        }
        .msg-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: left;
        }
        .input-bar {
            background: #1a1a1a;
            padding: 8px 12px;
            display: flex;
            gap: 8px;
            border-top: 1px solid #2c2c2c;
        }
        .input-bar input {
            flex: 1;
            background: #2a2a2a;
            border: none;
            border-radius: 25px;
            padding: 10px 16px;
            color: white;
            font-family: inherit;
            outline: none;
        }
        .input-btn {
            background: #2a2a2a;
            border: none;
            color: #ff0050;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.1s;
        }
        .send-btn { background: #ff0050; color: white; }
        .mic-btn.recording {
            background: #ff4d4d;
            color: white;
            animation: pulse 0.8s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        .global-toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
        .image-viewer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 20000;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .image-viewer.active { display: flex; }
        .image-viewer img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" id="backBtn"><i class="fas fa-arrow-right"></i></button>
        <div class="avatar" id="chatAvatar">?</div>
        <div class="chat-info">
            <div class="chat-name" id="chatName">...</div>
            <div class="chat-status" id="chatStatus">...</div>
        </div>
    </div>

    <div class="messages-area" id="messagesArea">
        <div class="msg-row other"><div class="msg-bubble">جاري تحميل المحادثة...</div></div>
    </div>

    <div class="input-bar">
        <button class="input-btn" id="attachBtn"><i class="fas fa-paperclip"></i></button>
        <button class="input-btn mic-btn" id="micBtn"><i class="fas fa-microphone"></i></button>
        <input type="text" id="msgInput" placeholder="اكتب رسالة...">
        <button class="input-btn send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
    <input type="file" id="fileInput" style="display:none" accept="image/*">

    <div class="image-viewer" id="imageViewer" onclick="this.classList.remove('active')">
        <img id="viewerImg" src="">
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const SUPABASE_URL = 'https://serlegwdzjulfcxabxzv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_4_c97KxnG_7HTvfv-pKeNQ_FTlnK6Yx';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        const chatId = localStorage.getItem('currentChatId');
        if (!chatId) window.location.href = 'chats.html';

        const userStr = localStorage.getItem('ramzapp_user');
        if (!userStr) window.location.href = 'login.html';
        const currentUser = JSON.parse(userStr);
        
        let chatUser = null;
        let isUploading = false;

        // التسجيل الصوتي
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'global-toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            requestAnimationFrame(() => toast.style.opacity = '1');
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' })[m]);
        }

        function appendMessage(msg, isMe, scroll = true) {
            const area = document.getElementById('messagesArea');
            if (area.children.length === 1 && area.children[0].innerText.includes('جاري تحميل المحادثة')) {
                area.innerHTML = '';
            }
            const div = document.createElement('div');
            div.className = `msg-row ${isMe ? 'own' : 'other'}`;
            let contentHtml = '';
            if (msg.type === 'image' && msg.media_url) {
                contentHtml = `<img src="${msg.media_url}" class="msg-image" onclick="event.stopPropagation(); document.getElementById('viewerImg').src='${msg.media_url}'; document.getElementById('imageViewer').classList.add('active');">`;
            } else if (msg.type === 'voice' && msg.media_url) {
                contentHtml = `<audio controls src="${msg.media_url}"></audio>`;
            } else {
                contentHtml = `<div>${escapeHtml(msg.content || '')}</div>`;
            }
            div.innerHTML = `
                <div class="msg-bubble">
                    ${contentHtml}
                    <div class="msg-time">${new Date(msg.created_at).toLocaleTimeString('ar-SA', { hour:'2-digit', minute:'2-digit' })}</div>
                </div>
            `;
            area.appendChild(div);
            if (scroll) area.scrollTop = area.scrollHeight;
        }

        // رفع صورة
        async function uploadImage(file) {
            const fileName = `${currentUser.id}/${Date.now()}_${file.name}`;
            const { error } = await supabase.storage.from('ramz-images').upload(fileName, file);
            if (error) throw error;
            const { data: publicURL } = supabase.storage.from('ramz-images').getPublicUrl(fileName);
            return publicURL.publicUrl;
        }

        // رفع صوت
        async function uploadAudio(blob) {
            const fileName = `voices/${currentUser.id}/${Date.now()}.webm`;
            const { error } = await supabase.storage.from('ramz-images').upload(fileName, blob);
            if (error) throw error;
            const { data: publicURL } = supabase.storage.from('ramz-images').getPublicUrl(fileName);
            return publicURL.publicUrl;
        }

        async function sendMessage(text, mediaUrl = null, type = 'text') {
            const newMsg = {
                sender_id: currentUser.id,
                receiver_id: chatId,
                content: text || '',
                type: type,
                media_url: mediaUrl || null,
                status: 'sent',
                created_at: new Date().toISOString()
            };
            appendMessage({ content: text, type, media_url: mediaUrl, created_at: newMsg.created_at }, true, true);
            const { error } = await supabase.from('messages').insert(newMsg);
            if (error) showToast('⚠️ فشل الإرسال');
        }

        // تحميل بيانات المستخدم الآخر
        async function loadChatUser() {
            const { data } = await supabase.from('users').select('*').eq('id', chatId).single();
            if (data) {
                chatUser = data;
                document.getElementById('chatName').innerText = chatUser.name;
                document.getElementById('chatAvatar').innerText = chatUser.avatar || chatUser.name.charAt(0);
                document.getElementById('chatStatus').innerHTML = chatUser.is_online ? '🟢 متصل' : '🔴 غير متصل';
            }
        }

        // تحميل جميع الرسائل السابقة
        async function loadMessages() {
            const { data } = await supabase
                .from('messages')
                .select('*')
                .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${chatId}),and(sender_id.eq.${chatId},receiver_id.eq.${currentUser.id})`)
                .order('created_at', { ascending: true });
            
            const area = document.getElementById('messagesArea');
            area.innerHTML = '';
            if (!data || data.length === 0) {
                area.innerHTML = '<div class="msg-row other"><div class="msg-bubble">✨ لا توجد رسائل بعد، اكتب أول رسالة</div></div>';
                return;
            }
            data.forEach(msg => appendMessage(msg, msg.sender_id === currentUser.id, false));
            area.scrollTop = area.scrollHeight;
            
            const unreadIds = data.filter(m => m.sender_id === chatId && m.status !== 'read').map(m => m.id);
            if (unreadIds.length) await supabase.from('messages').update({ status: 'read' }).in('id', unreadIds);
        }

        // رفع الصورة ومعالجتها
        async function handleImageUpload(file) {
            if (!file || isUploading) return;
            isUploading = true;
            showToast('📤 جاري رفع الصورة...');
            try {
                const imageUrl = await uploadImage(file);
                await sendMessage('', imageUrl, 'image');
                showToast('✅ تم إرسال الصورة');
            } catch (err) {
                showToast('❌ فشل رفع الصورة');
            } finally {
                isUploading = false;
            }
        }

        // بدء التسجيل الصوتي
        async function startRecording() {
            if (isRecording) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    showToast('📤 جاري رفع التسجيل...');
                    try {
                        const audioUrl = await uploadAudio(audioBlob);
                        await sendMessage('🎤 رسالة صوتية', audioUrl, 'voice');
                        showToast('✅ تم إرسال التسجيل');
                    } catch (err) {
                        showToast('❌ فشل رفع التسجيل');
                    }
                    stream.getTracks().forEach(t => t.stop());
                    isRecording = false;
                    document.getElementById('micBtn').classList.remove('recording');
                };
                mediaRecorder.start();
                isRecording = true;
                document.getElementById('micBtn').classList.add('recording');
                showToast('🎙️ سجل... ارفع إصبعك للإرسال');
            } catch (err) {
                showToast('⚠️ لا يمكن الوصول للميكروفون');
            }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
        }

        // Realtime للرسائل الجديدة
        supabase
            .channel(`chat-${chatId}`)
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `receiver_id=eq.${currentUser.id}` }, (payload) => {
                if (payload.new.sender_id === chatId) {
                    appendMessage(payload.new, false, true);
                    supabase.from('messages').update({ status: 'read' }).eq('id', payload.new.id);
                }
            })
            .subscribe();

        // أحداث الصفحة
        document.getElementById('backBtn').onclick = () => window.location.href = 'chats.html';
        document.getElementById('sendBtn').onclick = async () => {
            const text = document.getElementById('msgInput').value.trim();
            if (!text) return;
            document.getElementById('msgInput').value = '';
            await sendMessage(text);
        };
        document.getElementById('msgInput').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('sendBtn').click(); });
        document.getElementById('attachBtn').onclick = () => document.getElementById('fileInput').click();
        document.getElementById('fileInput').onchange = e => { if (e.target.files[0]) handleImageUpload(e.target.files[0]); e.target.value = ''; };
        
        // أحداث زر الميكروفون (اضغط مع الاستمرار)
        const micBtn = document.getElementById('micBtn');
        micBtn.addEventListener('mousedown', startRecording);
        micBtn.addEventListener('mouseup', stopRecording);
        micBtn.addEventListener('mouseleave', stopRecording);
        micBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
        micBtn.addEventListener('touchend', stopRecording);

        await loadChatUser();
        await loadMessages();

        window.addEventListener('beforeunload', () => {
            supabase.from('users').update({ is_online: false, last_seen: new Date() }).eq('id', currentUser.id);
        });
    </script>
</body>
</html>
